<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Vastra | Shopping Cart</title>
  <link rel="stylesheet" href="cart.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <a href="index.html">
          <h1 class="brand">Global <span>Vastra</span></h1>
        </a>
      </div>
      <ul class="nav-menu">
        <li class="nav-item">
          <a href="index.html" class="nav-link">Home</a>
        </li>
        <li class="nav-item">
          <a href="products.html" class="nav-link">Products</a>
        </li>
        <li class="nav-item">
          <a href="cart.html" class="nav-link active">Cart (<span id="cartCount">0</span>)</a>
        </li>
        <li class="nav-item">
          <a href="login.html" class="nav-link">Login</a>
        </li>
      </ul>
      <div class="hamburger">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <div class="container">
      <header class="page-header">
        <h1>Shopping Cart</h1>
        <p>Review your items before checkout</p>
      </header>

      <div class="cart-container">
        <!-- Empty Cart Message -->
        <div id="emptyCart" class="empty-cart">
          <div class="empty-cart-icon">🛒</div>
          <h2>Your cart is empty</h2>
          <p>Looks like you haven't added any items to your cart yet.</p>
          <a href="products.html" class="btn btn-primary">Continue Shopping</a>
        </div>

        <!-- Cart Items -->
        <div id="cartItems" class="cart-items">
          <!-- Cart items will be dynamically inserted here -->
        </div>

        <!-- Cart Summary -->
        <div id="cartSummary" class="cart-summary">
          <div class="summary-card">
            <h3>Order Summary</h3>
            <div class="summary-row">
              <span>Subtotal:</span>
              <span id="subtotal">₹0</span>
            </div>
            <div class="summary-row">
              <span>Shipping:</span>
              <span id="shipping">₹50</span>
            </div>
            <div class="summary-row">
              <span>Tax:</span>
              <span id="tax">₹0</span>
            </div>
            <hr>
            <div class="summary-row total">
              <span>Total:</span>
              <span id="total">₹0</span>
            </div>
            <button class="btn btn-primary checkout-btn" onclick="proceedToCheckout()">
              Proceed to Checkout
            </button>
            <a href="products.html" class="btn btn-secondary">Continue Shopping</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="cart.js"></script>
</body>
</html>
